
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 防浏览器缓存核心代码 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博垚商贸</title>
    <meta name="description" content="博垚商贸官网，分享好货">
    <meta property="og:type" content="website">
    <meta property="og:title" content="博垚商贸">
    <meta property="og:description" content="分享好货">
    <meta property="og:url" content="https://boyao.com/">
    <meta property="og:site_name" content="博垚商贸">

    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #007bff;
            --bg-color: #000000;
            --nav-bg: rgba(0, 0, 0, 0.85);
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --grid-color: rgba(255, 255, 255, 0.12);
            --grid-size: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            overflow-x: hidden;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: var(--nav-bg);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            z-index: 1000;
            transition: var(--transition);
        }

        .navbar.active {
            opacity: 1;
            transform: translateY(0);
        }

        .navbar-logo {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary-color);
            text-decoration: none;
        }

        .navbar-menu {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-item {
            height: 70px;
            display: flex;
            align-items: center;
        }

        .nav-item > a {
            color: #cccccc;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .nav-item > a:hover {
            color: var(--accent-color);
        }

        /* 主视觉区域 */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        /* 科技网格 */
        .hero-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            z-index: 2;
            pointer-events: none;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
            z-index: 1;
        }

        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .hero-title {
            margin-bottom: 20px;
        }

        .hero-title .cn-text {
            display: block;
            font-size: clamp(36px, 7vw, 72px);
            font-weight: 800;
            letter-spacing: 8px;
            color: var(--accent-color);
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.3s;
        }

        .hero-title .en-text {
            display: block;
            font-size: clamp(24px, 5vw, 48px);
            font-weight: 500;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            letter-spacing: 2px;
            color: var(--primary-color);
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.5s;
        }

        .hero-slogan {
            font-size: clamp(16px, 3vw, 24px);
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--primary-color);
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.6s;
        }

        .hero-btn {
            display: inline-block;
            padding: 12px 36px;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            transition: var(--transition);
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.9s;
        }

        .hero-btn:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
            }
            .navbar-menu {
                display: none;
            }
            .hero-title .cn-text {
                letter-spacing: 4px;
            }
            .hero-slogan {
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <nav class="navbar">
        <a href="#home" class="navbar-logo">BOYAOBUSINESS</a>
        <ul class="navbar-menu">
            <li class="nav-item">
                <a href="#home">首页</a>
            </li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <div class="hero-grid"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-title">
                <span class="cn-text">博垚商贸官网</span>
                <span class="en-text">boyao.com</span>
            </div>
            <p class="hero-slogan">网站正在建设中，敬请期待！</p>
            <a href="https://www.douyin.com" target="_blank" class="hero-btn">前往博垚</a>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 100) {
                navbar.classList.add('active');
            } else {
                navbar.classList.remove('active');
            }
        });
        document.oncontextmenu = function(){return false;}
    </script>
</body>
</html>
